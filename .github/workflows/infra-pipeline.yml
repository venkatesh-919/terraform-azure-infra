name: Terraform Azure Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_VERSION: 1.8.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: envselect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "env_name=dev" >> $GITHUB_OUTPUT
            echo "tfvars_file=env/terraform-dev.tfvars" >> $GITHUB_OUTPUT
            echo "backend_file=env/dev.backend.hcl" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
            echo "tfvars_file=env/terraform-prod.tfvars" >> $GITHUB_OUTPUT
            echo "backend_file=env/prod.backend.hcl" >> $GITHUB_OUTPUT
          else
            echo "env_name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "tfvars_file=env/terraform-${{ github.event.inputs.environment }}.tfvars" >> $GITHUB_OUTPUT
            echo "backend_file=env/${{ github.event.inputs.environment }}.backend.hcl" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -reconfigure -backend-config=${{ steps.envselect.outputs.backend_file }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=${{ steps.envselect.outputs.tfvars_file }} \
            -out=tfplan

      - name: Terraform Show Plan
        if: always()
        run: terraform show -no-color tfplan > plan.txt

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ steps.envselect.outputs.env_name }}
          path: |
            tfplan
            plan.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const body = `## Terraform Plan (${process.env.ENV_NAME})
            \`\`\`
            ${plan.substring(0, 65000)}
            \`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
        env:
          ENV_NAME: ${{ steps.envselect.outputs.env_name }}

      - name: Terraform Apply
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
          github.event_name == 'push'
        run: |
          terraform apply -auto-approve tfplan
